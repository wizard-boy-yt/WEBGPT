<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPT Redirection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0a;
            overflow: hidden;
        }
        
        body {
            background: radial-gradient(circle at center, #1a0a20 0%, #0a0a0a 70%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #9c27b0, #ff9800);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(156, 39, 176, 0.3);
        }
        
        .redirect-button {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #9c27b0, #ff9800);
            color: white;
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .redirect-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(156, 39, 176, 0.7);
        }
        
        .redirect-button:active {
            transform: translateY(1px);
        }
        
        .redirect-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }
        
        .redirect-button:hover::before {
            left: 100%;
        }
        
        .loading-text {
            margin-top: 1rem;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .loading-text.visible {
            opacity: 1;
        }
        
        /* Background animation */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(156, 39, 176, 0.3), rgba(255, 152, 0, 0.3));
            filter: blur(60px);
            animation: pulse 8s infinite alternate;
        }
        
        .circle:nth-child(1) {
            top: 20%;
            left: 25%;
            width: 300px;
            height: 300px;
            animation-delay: 0s;
        }
        
        .circle:nth-child(2) {
            top: 50%;
            left: 70%;
            width: 250px;
            height: 250px;
            animation-delay: 2s;
        }
        
        .circle:nth-child(3) {
            top: 70%;
            left: 30%;
            width: 200px;
            height: 200px;
            animation-delay: 4s;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.3;
            }
            100% {
                transform: scale(1.5);
                opacity: 0.7;
            }
        }
        
        /* Responsive styles */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .redirect-button {
                padding: 0.8rem 1.6rem;
                font-size: 1rem;
            }
            
            .circle:nth-child(1) {
                width: 150px;
                height: 150px;
            }
            
            .circle:nth-child(2) {
                width: 120px;
                height: 120px;
            }
            
            .circle:nth-child(3) {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    
    <div class="container">
        <h1>Welcome to WebGPT</h1>
        <button id="redirectButton" class="redirect-button">Enter WebGPT</button>
        <div id="loadingText" class="loading-text">Taking you to the main page...</div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const redirectButton = document.getElementById('redirectButton');
            const loadingText = document.getElementById('loadingText');
            
            // Preserve the access token and other query parameters
            const currentUrl = window.location.href;
            const hashParams = window.location.hash;
            
            redirectButton.addEventListener('click', function() {
                // Show loading state
                redirectButton.textContent = 'Redirecting...';
                redirectButton.disabled = true;
                loadingText.classList.add('visible');
                
                // Redirect after a short delay
                setTimeout(function() {
                    // Redirect to the main page with the hash parameters
                    window.location.href = 'https://webgpt.app/zensite_main_page' + hashParams;
                }, 1500);
            });
        });
    </script>
</body>
</html>
