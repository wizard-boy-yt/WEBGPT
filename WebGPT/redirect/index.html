<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPT Redirection</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Preconnect to CDNs for faster loading -->
    <link rel="preconnect" href="https://unpkg.com">
</head>
<body>
    <div id="root"></div>
    
    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Three.js -->
    <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fallback script in case Three.js fails -->
    <script src="fallback.js"></script>
    
    <!-- Main App -->
    <script type="text/babel" src="app.js"></script>
    
    <!-- Inline script to ensure everything loads -->
    <script>
        // Check if everything loaded properly after a timeout
        setTimeout(function() {
            if (document.querySelector('.canvas-container') === null || 
                document.querySelector('.canvas-container').children.length === 0) {
                console.log('Fallback triggered by timeout check');
                // Manually trigger fallback if needed
                if (typeof THREE === 'undefined') {
                    const fallbackEvent = new Event('DOMContentLoaded');
                    window.dispatchEvent(fallbackEvent);
                }
            }
        }, 2000);
    </script>
</body>
</html>
